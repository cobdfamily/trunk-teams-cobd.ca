name: test

# Boots the docker-compose stack (cobdfamily/trunk +
# cobdfamily/talkshow from kibble.apps.blindhub.ca, with this
# checkout bind-mounted at /app/data/teams/cobd.ca inside the
# trunk container) and runs the E2E tests at tests/test_e2e.py.
# The kibble registry speaks plain HTTP, so the runner's docker daemon
# is reconfigured with kibble as an insecure-registry before pulling.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Nightly catches a trunk:latest or talkshow:latest regression that
  # breaks rendering of this data tree, instead of waiting for the
  # next push to surface it. 07:00 UTC, offset from the openapi-kados
  # (06:00) and nnels (06:30) crons.
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - name: configure docker for plain-HTTP kibble registry
        run: |
          sudo mkdir -p /etc/docker
          echo '{"insecure-registries":["kibble.apps.blindhub.ca"]}' \
            | sudo tee /etc/docker/daemon.json >/dev/null
          sudo systemctl restart docker
          for i in $(seq 1 30); do
            docker info >/dev/null 2>&1 && break
            sleep 1
          done

      - name: pull compose images
        run: docker compose pull

      - name: bring up stack
        run: docker compose up -d

      - name: install python test deps
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r tests/requirements.txt

      - name: wait for both services healthy
        run: |
          # docker compose's depends_on is not in this compose
          # (no service-to-service ordering needed), so wait for
          # both ports here before running tests.
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:1962/ >/dev/null 2>&1 \
            && curl -fsS http://127.0.0.1:8001/ >/dev/null 2>&1; then
              echo "stack ready"; exit 0
            fi
            sleep 2
          done
          echo "::error::stack failed to come up in 120s"
          docker compose ps
          docker compose logs --tail=80
          exit 1

      - name: run E2E tests
        run: python3 -m pytest tests/test_e2e.py -v

      - name: dump logs on failure
        if: failure()
        run: docker compose logs --tail=200

      - name: tear down
        if: always()
        run: docker compose down -v
